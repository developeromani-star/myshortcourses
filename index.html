<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #fff; max-width: 800px; margin: auto; padding: 20px; }
        header { text-align: center; padding: 20px 0; font-size: 1.8em; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid #fff; }
        .card { background: #000; border: 1px solid #fff; margin-bottom: 10px; overflow: hidden; transition: background 0.375s, color 0.375s; }
        .summary-btn { padding: 15px 20px; cursor: pointer; font-weight: 600; display: flex; justify-content: space-between; align-items: center; user-select: none; -webkit-tap-highlight-color: transparent; }
        .drawer { height: 0; transition: height 0.375s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
        .cf-stream { width: 100%; aspect-ratio: 16/9; display: block; border: none; }
    </style>
</head>
<body>

    <header>Mujahed Alqasmi Courses</header>

    <div id="container"></div>

    <script>
        function toggleDrawer(el) {
            const currentDrawer = el.nextElementSibling;
            const currentIcon = el.querySelector('.icon');
            const currentCard = el.parentElement;

            const allDrawers = document.querySelectorAll('.drawer');
            const allIcons = document.querySelectorAll('.icon');
            const allCards = document.querySelectorAll('.card');

            allDrawers.forEach((drawer, index) => {
                if (drawer !== currentDrawer) {
                    drawer.style.height = '0px';
                    allIcons[index].textContent = '+';
                    allCards[index].style.backgroundColor = '#000';
                    allCards[index].style.color = '#fff';
                }
            });

            if (currentDrawer.style.height === '0px' || !currentDrawer.style.height) {
                currentDrawer.style.height = currentDrawer.scrollHeight + 'px';
                currentIcon.textContent = '-';
                currentCard.style.backgroundColor = '#fff';
                currentCard.style.color = '#000';
            } else {
                currentDrawer.style.height = '0px';
                currentIcon.textContent = '+';
                currentCard.style.backgroundColor = '#000';
                currentCard.style.color = '#fff';
            }
        }
    </script>
</body>
</html>
